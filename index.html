<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TingNotes - 探索筆記</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>
    
    <header class="zen-header">
        <div class="container">
            <nav>
                <a href="/" class="logo">TingNotes</a>
                
                <div class="nav-controls">
                    <button class="theme-toggle" onclick="toggleTheme()" title="切換模式">
                        <svg class="theme-icon" id="theme-icon" width="20" height="20" viewBox="0 0 24 24"></svg>
                    </button>
                    <button class="menu-trigger" onclick="toggleMobileMenu()">
                        <span class="menu-label">MENU</span>
                        <div class="hamburger-icon">
                            <span></span><span></span>
                        </div>
                    </button>
                </div>

                <div class="hidden-nav-overlay">
                    <ul class="nav-links-vertical">
                        <li><a href="Learning/index.html" class="nav-item"><span class="nav-num">01.</span> 學習 Learning</a></li>
                        <li><a href="Investment/index.html" class="nav-item"><span class="nav-num">02.</span> 投資 Investment</a></li>
                        <li><a href="Travel/index.html" class="nav-item"><span class="nav-num">03.</span> 旅遊 Travel</a></li>
                        <li><a href="Others/index.html" class="nav-item"><span class="nav-num">04.</span> 雜事 Others</a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>

    <main class="zen-main">
        <div class="container">
            
            <section class="zen-search-section fade-in">
                <div class="search-wrapper">
                    <input type="text" id="zen-search-input" placeholder="Type to explore..." autocomplete="off">
                    <div class="search-underline"></div>
                </div>
                
                <div class="zen-tags fade-in" id="topic-filter-row">
                    <button onclick="filterByTopic('')"            class="topic-btn active" id="tf-all">全部</button>
                    <button onclick="filterByTopic('learning')"    class="topic-btn" id="tf-learning">學習</button>
                    <button onclick="filterByTopic('investment')"  class="topic-btn" id="tf-investment">投資</button>
                    <button onclick="filterByTopic('travel')"      class="topic-btn" id="tf-travel">旅遊</button>
                    <button onclick="filterByTopic('others')"      class="topic-btn" id="tf-others">其他</button>
                </div>


            </section>

            <section class="zen-list-section fade-in">
                <div class="list-header">RECENT UPDATES_</div>
                <div id="ghost-list-container" class="ghost-list">
                    </div>
            </section>

        </div>
    </main>

    <footer class="zen-footer">
        <div class="container">
            <div class="footer-links">
                <a href="/about.html">About</a>
                <span class="separator">/</span>
                <a href="mailto:contact@tingnotes.io">Contact</a>
                <span class="separator">/</span>
                <a href="/privacy.html">Privacy</a>
            </div>
            <p class="copyright">© 2025 TingNotes.io</p>
        </div>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
